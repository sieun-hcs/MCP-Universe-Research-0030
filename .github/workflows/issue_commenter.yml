
name: Issue Commenter
on:
  issues:
    types: [opened]

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on new issue
        uses: actions/github-script@v6
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(label => label.name);
            let commentBody = '';

            if (labels.includes('bug')) {
              commentBody = 'Thank you. We will fix it.';
            } else if (labels.includes('feature')) {
              commentBody = 'Thank you, we will consider to include this feature.';
            } else if (labels.includes('discussion')) {
              commentBody = 'Thanks for starting this discussion! We welcome community input.';
            }

            if (commentBody) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: commentBody
              });
            }
